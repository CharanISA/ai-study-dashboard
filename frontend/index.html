<!DOCTYPE html>
<html>
<head>
    <title>AI Study Analytics Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>AI Study Analytics Dashboard</h1>

    <div class="card">
        <h2>Add Study Session</h2>
        <input id="subject" placeholder="Subject">
        <input id="hours" type="number" placeholder="Hours studied">
        <textarea id="notes" placeholder="Notes"></textarea>
        <button onclick="addSession()">Add Session</button>
    </div>

    <div class="card">
        <h2>Total Study Hours</h2>
        <h3 id="totalHours">0</h3>
    </div>

    <div class="card">
        <h2>Study Sessions</h2>
        <div id="sessions"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
